services:
  app:
    build: .
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: loyalty
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
